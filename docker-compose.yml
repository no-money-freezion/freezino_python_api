services:
  # ---- FastAPI Backend ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freezino-backend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
      # main.py currently ignores SECRET_KEY (hardcoded in main.py:14).
      # Kept here as forward-compat for BE-006. Dev-only placeholder — not a secret.
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-openssl-rand-hex-32}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      # Ignored by main.py right now; entrypoint.sh symlinks the volume into CWD.
      DB_PATH: /app/data/freezino.db
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8080"
    volumes:
      - backend-data:/app/data
    networks:
      - freezino-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend and nginx services are added in PR 2 (FE-001 + FE-005).
  # Until then, hit the backend directly on :3000.

volumes:
  backend-data:
    driver: local

networks:
  freezino-network:
    driver: bridge
