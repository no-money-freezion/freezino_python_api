services:
  # ---- FastAPI Backend ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freezino-backend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
      # main.py currently ignores SECRET_KEY (hardcoded in main.py:14).
      # Kept here as forward-compat for BE-006. Dev-only placeholder — not a secret.
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-openssl-rand-hex-32}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      # Ignored by main.py right now; entrypoint.sh symlinks the volume into CWD.
      DB_PATH: /app/data/freezino.db
      CORS_ORIGINS: "http://localhost:5173,http://localhost:8080"
    volumes:
      - backend-data:/app/data
    networks:
      - freezino-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---- React Frontend (Vite dev server) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: freezino-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Vite reads these at dev time
      VITE_API_URL: http://localhost:8080/api
      VITE_GOOGLE_ENABLED: "false"
    volumes:
      - ./frontend:/app
      # Shadow node_modules so host dir doesn't blow away container install
      - /app/node_modules
    networks:
      - freezino-network
    depends_on:
      - backend

  # ---- Nginx reverse proxy (dev) ----
  nginx:
    image: nginx:alpine
    container_name: freezino-nginx-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - freezino-network
    depends_on:
      - backend
      - frontend

volumes:
  backend-data:
    driver: local

networks:
  freezino-network:
    driver: bridge
