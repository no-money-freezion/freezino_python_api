<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Freezino — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root {
  /* Surfaces — richer dark with a purple-black base */
  --bg-0:#0A0710; --bg-1:#140F1E; --bg-2:#1E1630; --bg-3:#2A1F45;
  --fg-1:#FFFFFF; --fg-2:#D6CFE6; --fg-3:#9189A8; --fg-4:#5A5370;
  --border-1:rgba(255,255,255,.08);
  --border-2:rgba(255,255,255,.16);

  /* Casino palette — GOLD as primary, neon-red accent, neon-cyan */
  --gold:      #FFC839;
  --gold-bright:#FFE14A;
  --gold-dim:  #D19A24;
  --gold-soft: rgba(255,200,57,.15);

  --accent:    #FF2E63;       /* hot pink-red, jackpot loss */
  --accent-bright:#FF5C8A;
  --accent-soft:rgba(255,46,99,.15);

  --cyan:      #00E5FF;       /* secondary neon for specials */
  --cyan-soft: rgba(0,229,255,.15);

  --purple:    #B344FF;
  --purple-soft:rgba(179,68,255,.15);

  --green:     #00E676;       /* wins, positive balance */
  --green-soft:rgba(0,230,118,.15);

  --tier-common:#8E8AAB; --tier-rare:#4FC3F7;
  --tier-epic:#B344FF; --tier-legendary:#FFC839;

  --font-sans:'Inter',ui-sans-serif,system-ui,sans-serif;
  --font-serif:'Instrument Serif','Iowan Old Style',Georgia,serif;
  --font-mono:'JetBrains Mono',ui-monospace,Menlo,monospace;

  --radius-sm:4px; --radius-md:8px; --radius-lg:14px; --radius-xl:20px; --radius-full:9999px;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);

  --glow-gold: 0 0 24px rgba(255,200,57,.45), 0 0 64px rgba(255,200,57,.25);
  --glow-accent: 0 0 24px rgba(255,46,99,.5), 0 0 64px rgba(255,46,99,.25);
  --glow-green: 0 0 24px rgba(0,230,118,.4);
  --glow-cyan: 0 0 24px rgba(0,229,255,.4);
}
*{box-sizing:border-box}
html,body{background:var(--bg-0);color:var(--fg-2);margin:0;font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(1200px 800px at 80% -10%, rgba(179,68,255,.15), transparent 60%),
    radial-gradient(900px 600px at 10% 100%, rgba(255,46,99,.12), transparent 55%),
    var(--bg-0);
  background-attachment:fixed;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
button:disabled{cursor:not-allowed;opacity:.4}
input{font-family:inherit;outline:none}
::selection{background:var(--gold);color:#111}

.h-display{font-family:var(--font-serif);font-weight:400;font-size:80px;line-height:.95;letter-spacing:-0.025em;color:var(--fg-1)}
.h-display i{font-style:italic;color:var(--gold)}
.h1{font-family:var(--font-sans);font-weight:700;font-size:36px;line-height:1.05;letter-spacing:-0.02em;color:var(--fg-1)}
.h2{font-family:var(--font-sans);font-weight:700;font-size:26px;line-height:1.15;letter-spacing:-0.015em;color:var(--fg-1)}
.h3{font-family:var(--font-sans);font-weight:600;font-size:19px;line-height:1.25;letter-spacing:-0.01em;color:var(--fg-1)}
.p-lg{font-size:17px;color:var(--fg-2);line-height:1.55}
.p{font-size:15px;color:var(--fg-2);line-height:1.55}
.p-sm{font-size:13px;color:var(--fg-3);line-height:1.5}
.label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-3)}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.money{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:600;color:var(--gold)}
.money-white{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:600;color:var(--fg-1)}

/* Layout */
.app{display:flex;min-height:100vh}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.content{flex:1;overflow-y:auto}
.container{max-width:1240px;margin:0 auto;padding:0 40px}

/* Header */
.header{position:sticky;top:0;z-index:40;background:rgba(10,7,16,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-1)}
.header-inner{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;gap:24px}
.jackpot-ticker{display:flex;align-items:center;gap:10px;padding:6px 14px;border-radius:var(--radius-full);background:linear-gradient(90deg,rgba(255,200,57,.15),rgba(255,46,99,.15));border:1px solid var(--border-1)}
.jackpot-ticker .label{color:var(--gold);font-size:10px}
.jackpot-ticker .money{font-size:14px;color:var(--gold-bright);text-shadow:0 0 8px rgba(255,200,57,.4)}
.balance-pill{display:flex;align-items:center;gap:12px;padding:8px 14px;border:1px solid var(--border-1);border-radius:var(--radius-md);background:var(--bg-1)}
.balance-pill .label{font-size:10px;color:var(--fg-3)}
.balance-pill .money{font-size:15px}
.icon-btn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-md);color:var(--fg-3);transition:all .12s var(--ease)}
.icon-btn:hover{background:var(--bg-2);color:var(--gold)}

/* Language switcher */
.lang-menu-wrap{position:relative}
.lang-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--radius-md);background:var(--bg-1);border:1px solid var(--border-1);color:var(--fg-2);font-size:13px;font-weight:500;transition:all .12s var(--ease)}
.lang-btn:hover{border-color:var(--gold);color:var(--fg-1)}
.lang-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:160px;background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--radius-md);box-shadow:0 20px 48px rgba(0,0,0,.6);padding:4px;z-index:50;animation:fade-in .15s var(--ease)}
.lang-option{display:flex;align-items:center;gap:10px;padding:9px 12px;width:100%;border-radius:var(--radius-sm);color:var(--fg-2);font-size:13px;text-align:left;transition:background .1s var(--ease)}
.lang-option:hover{background:var(--bg-2);color:var(--fg-1)}
.lang-option.active{background:var(--bg-2);color:var(--gold)}
.lang-option .flag{font-size:18px;line-height:1}
@keyframes fade-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* Sidebar */
.sidebar{width:244px;flex-shrink:0;border-right:1px solid var(--border-1);background:rgba(20,15,30,.5);backdrop-filter:blur(10px);padding:24px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.sidebar-logo{padding:0 12px 24px;font-family:var(--font-serif);font-size:30px;letter-spacing:-0.02em;color:var(--fg-1);display:flex;align-items:baseline;gap:2px;line-height:1}
.sidebar-logo i{font-style:italic;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
.sidebar-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:var(--glow-gold);display:inline-block;margin-left:4px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-4);padding:18px 12px 8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-md);color:var(--fg-3);font-size:14px;font-weight:500;width:100%;text-align:left;transition:all .12s var(--ease);position:relative}
.nav-item:hover{background:var(--bg-2);color:var(--fg-1)}
.nav-item.active{background:linear-gradient(90deg,rgba(255,200,57,.15),transparent);color:var(--fg-1)}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--gold);box-shadow:var(--glow-gold)}
.nav-item .nav-icon{color:var(--fg-4)}
.nav-item.active .nav-icon{color:var(--gold)}
.nav-footer{margin-top:auto;padding:14px;border-radius:var(--radius-md);background:linear-gradient(135deg,rgba(255,46,99,.1),rgba(179,68,255,.08));border:1px solid var(--border-1)}
.nav-footer .label{color:var(--accent);margin-bottom:6px}
.nav-footer .note{font-size:12px;color:var(--fg-2);line-height:1.45}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--radius-md);font-size:14px;font-weight:600;transition:all .15s var(--ease);letter-spacing:.01em}
.btn-primary{background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim));color:#1A0F00;box-shadow:var(--glow-gold)}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 0 32px rgba(255,200,57,.6),0 0 80px rgba(255,200,57,.3)}
.btn-danger{background:linear-gradient(135deg,var(--accent-bright),var(--accent));color:#fff;box-shadow:var(--glow-accent)}
.btn-danger:hover:not(:disabled){transform:translateY(-1px)}
.btn-secondary{background:var(--bg-2);color:var(--fg-1);border:1px solid var(--border-1)}
.btn-secondary:hover:not(:disabled){background:var(--bg-3);border-color:var(--border-2)}
.btn-ghost{color:var(--fg-3)}
.btn-ghost:hover:not(:disabled){color:var(--fg-1)}
.btn-lg{padding:15px 28px;font-size:15px}
.btn-xl{padding:18px 36px;font-size:17px;font-weight:700}
.btn-block{width:100%}

/* Cards */
.card{background:var(--bg-1);border:1px solid var(--border-1);border-radius:var(--radius-lg);padding:24px}
.card-glow{background:linear-gradient(180deg,var(--bg-1),var(--bg-0));border:1px solid var(--border-1);border-radius:var(--radius-lg);padding:24px;position:relative;overflow:hidden}
.card-glow::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at var(--gx,50%) 0%,rgba(255,200,57,.08),transparent 70%);pointer-events:none}
.card-interactive{background:var(--bg-1);border:1px solid var(--border-1);border-radius:var(--radius-lg);transition:all .2s var(--ease);cursor:pointer}
.card-interactive:hover{border-color:var(--gold);background:var(--bg-2);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4),0 0 0 1px rgba(255,200,57,.2)}

/* Inputs */
.input{background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-md);padding:12px 14px;color:var(--fg-1);font-size:14px;width:100%;transition:border-color .12s var(--ease)}
.input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
.input::placeholder{color:var(--fg-4)}
.field label{display:block;font-size:12px;font-weight:500;color:var(--fg-3);margin-bottom:6px}

/* Tag */
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:600;letter-spacing:.04em;background:var(--bg-2);color:var(--fg-2);border:1px solid var(--border-1)}
.tag-gold{background:var(--gold-soft);color:var(--gold);border-color:rgba(255,200,57,.3)}
.tag-accent{background:var(--accent-soft);color:var(--accent-bright);border-color:rgba(255,46,99,.3)}
.tag-cyan{background:var(--cyan-soft);color:var(--cyan);border-color:rgba(0,229,255,.3)}
.tag-purple{background:var(--purple-soft);color:#D185FF;border-color:rgba(179,68,255,.3)}
.tag-green{background:var(--green-soft);color:var(--green);border-color:rgba(0,230,118,.3)}

/* Losing meter */
.losing-meter{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--radius-full);background:var(--accent-soft);color:var(--accent-bright);font-family:var(--font-mono);font-size:12px;font-weight:600;border:1px solid rgba(255,46,99,.2)}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1.4s var(--ease) infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}

/* Utilities */
.row{display:flex;align-items:center}
.col{display:flex;flex-direction:column}
.grid{display:grid}
.between{justify-content:space-between}
.gap-1{gap:4px}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-6{gap:24px}.gap-8{gap:32px}
.mt-2{margin-top:8px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-8{margin-top:32px}.mt-12{margin-top:48px}
.mb-2{margin-bottom:8px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}.mb-12{margin-bottom:48px}
.flex-1{flex:1}.text-center{text-align:center}

/* Shimmer (for jackpot numbers) */
.shimmer{background:linear-gradient(90deg,var(--gold) 0%,var(--gold-bright) 25%,#FFF8A3 50%,var(--gold-bright) 75%,var(--gold) 100%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Progress bar */
.bar{height:8px;border-radius:var(--radius-full);background:var(--bg-2);overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--gold),var(--accent));transition:width .4s var(--ease);box-shadow:0 0 12px rgba(255,200,57,.4)}
.bar-fill.danger{background:linear-gradient(90deg,var(--accent),var(--purple))}
.bar-fill.success{background:linear-gradient(90deg,var(--green),var(--cyan))}

/* Confetti-like decorative dots on hero */
.hero-deco{position:relative;overflow:hidden;border-radius:var(--radius-xl);padding:48px;background:linear-gradient(135deg,rgba(255,200,57,.08),rgba(255,46,99,.08) 50%,rgba(179,68,255,.08));border:1px solid var(--border-1)}
.hero-deco::before,.hero-deco::after{content:"";position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none}
.hero-deco::before{top:-80px;right:-80px;width:240px;height:240px;background:var(--gold);opacity:.2}
.hero-deco::after{bottom:-100px;left:-80px;width:280px;height:280px;background:var(--accent);opacity:.15}

/* Slot reel shine */
.reel-cell{position:relative;overflow:hidden}
.reel-cell.winner::after{content:"";position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 0 0 2px var(--gold),inset 0 0 24px rgba(255,200,57,.5);pointer-events:none}

/* Chip with rim */
.chip{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-family:var(--font-mono);font-size:13px;font-weight:700;color:#fff;position:relative;flex-shrink:0}
.chip::before{content:"";position:absolute;inset:3px;border-radius:50%;border:2px dashed rgba(255,255,255,.35)}

/* ─── Mobile bottom nav ─── */
.bottom-nav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:45;background:rgba(10,7,16,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border-2);padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:var(--radius-md);color:var(--fg-4);font-size:10px;font-weight:600;letter-spacing:.02em;transition:color .12s var(--ease);position:relative;min-width:0}
.bottom-nav-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bottom-nav-item.active{color:var(--gold)}
.bottom-nav-item.active::after{content:"";position:absolute;top:2px;left:50%;transform:translateX(-50%);width:22px;height:2px;border-radius:2px;background:var(--gold);box-shadow:var(--glow-gold)}
.mobile-more-sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--bg-1);border-top:1px solid var(--border-2);border-radius:20px 20px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom));animation:sheet-up .22s var(--ease)}
.mobile-more-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:55;animation:fade-in .2s var(--ease)}
@keyframes sheet-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border-2);margin:0 auto 16px}
.sheet-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:var(--radius-md);color:var(--fg-2);font-size:15px;font-weight:500;width:100%;text-align:left;transition:background .1s var(--ease)}
.sheet-item:hover{background:var(--bg-2);color:var(--fg-1)}
.sheet-item.active{background:var(--bg-2);color:var(--gold)}
.sheet-item .sheet-icon{color:var(--fg-4);flex-shrink:0}
.sheet-item.active .sheet-icon{color:var(--gold)}

/* Hidden helpers */
.mobile-only{display:none}
.desktop-only{display:flex}

/* ─── Responsive breakpoints ─── */
@media (max-width: 900px){
  .container{padding:0 16px}
  .sidebar{display:none}
  .bottom-nav{display:flex}
  .content{padding-bottom:84px}
  .mobile-only{display:flex}
  .desktop-only{display:none}

  .header-inner{height:56px;padding:0 14px;gap:8px}
  .jackpot-ticker{padding:5px 10px;gap:6px}
  .jackpot-ticker .label{display:none}
  .jackpot-ticker .money{font-size:12px}
  .losing-meter{padding:5px 9px;font-size:11px}
  .balance-pill{padding:6px 10px;gap:6px}
  .balance-pill .label{display:none}
  .balance-pill .money{font-size:13px}
  .icon-btn{width:32px;height:32px}
  .lang-btn{padding:6px 8px;font-size:12px}

  .h-display{font-size:44px;line-height:1}
  .h1{font-size:26px}
  .h2{font-size:21px}
  .h3{font-size:17px}
  .p-lg{font-size:15px}

  .hero-deco{padding:28px 20px;border-radius:var(--radius-lg)}
  .card{padding:18px;border-radius:var(--radius-md)}
  .card-glow{padding:20px;border-radius:var(--radius-md)}
  .btn-xl{padding:14px 22px;font-size:15px}
  .btn-lg{padding:13px 20px;font-size:14px}

  /* Grid overrides — collapse multi-col layouts */
  .grid[style*="repeat(5"]{grid-template-columns:repeat(2,1fr) !important}
  .grid[style*="repeat(4"]{grid-template-columns:repeat(2,1fr) !important}
  .grid[style*="repeat(3"]{grid-template-columns:repeat(2,1fr) !important}
  .grid[style*="2fr 1fr 1fr"]{grid-template-columns:1fr !important}
  .grid[style*="2fr 1fr"]{grid-template-columns:1fr !important}
  .grid[style*="1fr 2fr"]{grid-template-columns:1fr !important}

  /* Stats table → card list on mobile */
  .stats-table-row{grid-template-columns:1fr !important;gap:10px !important;padding:16px !important}
  .stats-table-head{display:none !important}
  .stats-cell-mobile-label{display:block !important;font-size:10px;color:var(--fg-4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}

  /* Slots cells shrink */
  .reel-cell{font-size:34px !important}

  /* Roulette wheel scales */
  .roulette-wheel{transform:scale(.8);transform-origin:center top}
}

@media (max-width: 480px){
  .grid[style*="repeat(3"]{grid-template-columns:1fr !important}
  .grid[style*="repeat(2"]{grid-template-columns:1fr !important}
  .h-display{font-size:36px}
  .container{padding:0 12px}
  .jackpot-ticker{display:none}
  .reel-cell{font-size:26px !important}
  .hero-deco{padding:24px 18px}
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
  // ─── i18n ────────────────────────────────────────────────────────────────
  const TRANSLATIONS = {
    ru: {
      code: 'ru', flag: '🇷🇺', label: 'Русский',
      nav: { play: 'Играть', other: 'Остальное', games: 'Игры', shop: 'Магазин',
             profile: 'Профиль', credit: 'Кредит', work: 'Работа', stats: 'Статистика' },
      common: { balance: 'Баланс', back: 'Назад', signIn: 'Войти', signUp: 'Создать аккаунт',
                login: 'Вход', register: 'Регистрация', username: 'Логин', email: 'Email',
                password: 'Пароль', google: 'Войти через Google', or: 'или',

  function LangSwitcher({ current, onChange }) {
    const [open, setOpen] = React.useState(false);
    const ref = React.useRef(null);
    React.useEffect(() => {
      const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
      document.addEventListener('mousedown', h);
      return () => document.removeEventListener('mousedown', h);
    }, []);
    return (
      <div className="lang-menu-wrap" ref={ref}>
        <button className="lang-btn" onClick={() => setOpen(o => !o)}>
          <span style={{ fontSize: 16 }}>{current.flag}</span>
          {current.code.toUpperCase()}
          {I.chevDown}
        </button>
        {open && (
          <div className="lang-menu">
            {Object.values(TRANSLATIONS).map(l => (
              <button key={l.code}
                      className={`lang-option ${l.code === current.code ? 'active' : ''}`}
                      onClick={() => { onChange(l); setOpen(false); }}>
                <span className="flag">{l.flag}</span>
                <span style={{ flex: 1 }}>{l.label}</span>
                {l.code === current.code && I.check}
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ─── Roulette (trimmed to focus on key visuals) ─────────────────────────
  const WHEEL_NUMBERS = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
  const RED_NUMBERS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
  const rouletteColor = n => n === 0 ? 'green' : (RED_NUMBERS.includes(n) ? 'red' : 'black');
  const rouletteBg = n => rouletteColor(n) === 'red' ? 'var(--accent)' : rouletteColor(n) === 'green' ? 'var(--green)' : '#16111F';
  const chipPalette = [
    { v: 10,  bg: 'linear-gradient(135deg,#fff,#bbb)', color: '#000' },
    { v: 25,  bg: 'linear-gradient(135deg,var(--green),#00A854)', color: '#fff' },
    { v: 50,  bg: 'linear-gradient(135deg,var(--cyan),#0097B2)', color: '#001014' },
    { v: 100, bg: 'linear-gradient(135deg,#222,#000)', color: 'var(--gold)' },
    { v: 500, bg: 'linear-gradient(135deg,var(--purple),#6A1FA0)', color: '#fff' },
    { v: 1000,bg: 'linear-gradient(135deg,var(--gold-bright),var(--gold-dim))', color: '#4A2D00' },
  ];
  function RouletteScreen({ balance, onBalanceChange }) {
    const lang = React.useContext(LangCtx);
    const t = lang.roul;
    const [chip, setChip] = React.useState(10);
    const [bets, setBets] = React.useState([]);
    const [spinning, setSpinning] = React.useState(false);
    const [recent, setRecent] = React.useState([17, 0, 32, 8, 11, 26, 3]);
    const [result, setResult] = React.useState(null);
    const [rotation, setRotation] = React.useState(0);
    const totalBet = bets.reduce((s, b) => s + b.amount, 0);
    const addBet = (type, value) => {
      if (spinning || totalBet + chip > balance) return;
      setBets([...bets, { type, amount: chip, value }]);
    };
    const spin = () => {
      if (bets.length === 0) return;
      setSpinning(true); setResult(null);
      const winNum = WHEEL_NUMBERS[Math.floor(Math.random() * WHEEL_NUMBERS.length)];
      const idx = WHEEL_NUMBERS.indexOf(winNum);
      setRotation(r => r + 360 * 5 + idx * (360 / WHEEL_NUMBERS.length));
      setTimeout(() => {
        const won = bets.some(b =>
          (b.type === 'red' && rouletteColor(winNum) === 'red') ||
          (b.type === 'black' && rouletteColor(winNum) === 'black') ||
          (b.type === 'straight' && b.value === winNum));
        const payout = won ? totalBet * 2 : 0;
        setResult({ number: winNum, profit: payout - totalBet, total_bet: totalBet, total_win: payout });
        onBalanceChange(balance - totalBet + payout);
        setRecent(r => [winNum, ...r].slice(0, 10));
        setSpinning(false); setBets([]);
      }, 3500);
    };
    return (
      <div className="container" style={{ padding: '32px 40px 80px' }}>
        <div className="row between mb-8">
          <div>
            <div className="label mb-2" style={{ color: 'var(--accent)' }}>{t.table}</div>
            <h1 className="h1">{t.title}</h1>
          </div>
          <span className="tag tag-gold">{bets.length} {lang.common.active}</span>
        </div>

        <div className="grid gap-6" style={{ gridTemplateColumns: '1fr 2fr' }}>
          <div className="col gap-4">
            <div className="card" style={{ padding: 28, display: 'grid', placeItems: 'center', background: 'radial-gradient(circle at center, var(--bg-2), var(--bg-1))' }}>
              <div style={{ position: 'relative', width: 260, height: 260 }}>
                <div style={{
                  position: 'absolute', inset: 0, borderRadius: '50%',
                  background: 'radial-gradient(circle at 30% 30%, #2A1F45, #0A0710)',
                  border: '2px solid var(--gold)',
                  boxShadow: 'var(--glow-gold), inset 0 0 30px rgba(0,0,0,.8)',
                  transform: `rotate(${rotation}deg)`,
                  transition: 'transform 3.5s cubic-bezier(.17,.67,.22,1)',
                }}>
                  {WHEEL_NUMBERS.map((n, i) => {
                    const angle = (360 / WHEEL_NUMBERS.length) * i;
                    return (
                      <div key={i} style={{ position: 'absolute', inset: 0, transform: `rotate(${angle}deg)` }}>
                        <div style={{
                          position: 'absolute', top: 4, left: '50%', transform: 'translateX(-50%)',
                          width: 26, height: 26, display: 'grid', placeItems: 'center',
                          background: rouletteBg(n),
                          color: '#fff', fontSize: 11, fontFamily: 'var(--font-mono)',
                          fontWeight: 600, borderRadius: 3,
                          boxShadow: '0 0 4px rgba(0,0,0,.5)',
                        }}>{n}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{
                  position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                  width: 90, height: 90, borderRadius: '50%',
                  background: 'linear-gradient(135deg, var(--gold), var(--gold-dim))',
                  display: 'grid', placeItems: 'center',
                  fontFamily: 'var(--font-serif)', fontSize: 32, color: '#1A0F00',
                  boxShadow: 'var(--glow-gold)',
                }}><i style={{ fontStyle: 'italic' }}>F</i></div>
                <div style={{
                  position: 'absolute', top: -8, left: '50%', transform: 'translateX(-50%)',
                  width: 0, height: 0,
                  borderLeft: '8px solid transparent', borderRight: '8px solid transparent',
                  borderTop: '14px solid var(--accent)',
                  filter: 'drop-shadow(0 0 8px var(--accent))',
                }}/>
              </div>
            </div>

            <div className="card" style={{ padding: 20 }}>
              <div className="label mb-3">{t.recent}</div>
              <div className="row gap-2" style={{ flexWrap: 'wrap' }}>
                {recent.map((n, i) => (
                  <div key={i} style={{
                    width: 34, height: 34, borderRadius: '50%',
                    background: rouletteBg(n), color: '#fff',
                    display: 'grid', placeItems: 'center',
                    fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600,
                    boxShadow: '0 2px 6px rgba(0,0,0,.5)',
                  }}>{n}</div>
                ))}
              </div>
            </div>

            {result && (
              <div className="card" style={{
                padding: 20,
                borderColor: result.profit > 0 ? 'var(--green)' : 'var(--accent)',
                boxShadow: result.profit > 0 ? 'var(--glow-green)' : 'var(--glow-accent)',
              }}>
                <div className="label mb-2" style={{ color: result.profit > 0 ? 'var(--green)' : 'var(--accent)' }}>
                  {result.profit > 0 ? t.win : t.loss}
                </div>
                <div className="mono" style={{
                  fontSize: 36, fontWeight: 700, letterSpacing: '-0.02em',
                  color: result.profit > 0 ? 'var(--green)' : 'var(--accent)',
                  marginBottom: 12,
                }}>
                  {result.profit > 0 ? '+' : '−'}${Math.abs(result.profit).toLocaleString()}
                </div>
                <div className="col gap-1">
                  <div className="row between"><span className="p-sm">{t.stake}</span>
                    <span className="mono money-white" style={{ fontSize: 13 }}>${result.total_bet}</span></div>
                  <div className="row between"><span className="p-sm">{t.payout}</span>
                    <span className="mono money-white" style={{ fontSize: 13 }}>${result.total_win}</span></div>
                </div>
              </div>
            )}
          </div>

          <div className="card" style={{ padding: 28 }}>
            <div className="row between mb-6">
              <h3 className="h3">{t.bets}</h3>
              <span className="money" style={{ fontSize: 22 }}>${totalBet.toLocaleString()}</span>
            </div>

            <div className="label mb-3">{t.chip}</div>
            <div className="row gap-3 mb-6" style={{ flexWrap: 'wrap' }}>
              {chipPalette.map(c => (
                <button key={c.v} onClick={() => setChip(c.v)}
                        className="chip"
                        style={{
                          background: c.bg, color: c.color,
                          outline: chip === c.v ? '3px solid var(--gold)' : 'none',
                          outlineOffset: 2,
                          transform: chip === c.v ? 'scale(1.1)' : 'none',
                          transition: 'all .15s var(--ease-spring)',
                          boxShadow: '0 4px 12px rgba(0,0,0,.5)',
                        }}>
                  {c.v >= 1000 ? '1K' : c.v}
                </button>
              ))}
            </div>

            <div style={{ display: 'flex', gap: 4, marginBottom: 8 }}>
              <button onClick={() => addBet('straight', 0)} disabled={spinning}
                      style={{
                        width: 44, height: 136,
                        background: 'linear-gradient(135deg, var(--green), #00A854)',
                        color: '#fff', fontFamily: 'var(--font-mono)', fontSize: 14, fontWeight: 700,
                        borderRadius: 'var(--radius-sm)',
                      }}>0</button>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)', gap: 4, flex: 1 }}>
                {[...Array(36)].map((_, i) => {
                  const n = i + 1;
                  return (
                    <button key={n} onClick={() => addBet('straight', n)} disabled={spinning}
                            style={{
                              height: 42,
                              background: rouletteColor(n) === 'red' ? 'var(--accent)' : '#16111F',
                              color: '#fff',
                              fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600,

  // ─── Slots ──────────────────────────────────────────────────────────────
  const SLOT_SYMBOLS = [
    { id: 'cherry', label: '♥', color: 'var(--accent)' },
    { id: 'club',   label: '♣', color: 'var(--fg-1)' },
    { id: 'diamond',label: '♦', color: 'var(--cyan)' },
    { id: 'spade',  label: '♠', color: 'var(--purple)' },
    { id: 'bell',   label: '★', color: 'var(--gold)' },
    { id: 'F',      label: 'F', color: 'var(--gold-bright)' },
    { id: '7',      label: '7', color: 'var(--accent-bright)' },
  ];
  const randSym = () => SLOT_SYMBOLS[Math.floor(Math.random() * SLOT_SYMBOLS.length)];
  const randReel = () => [randSym(), randSym(), randSym()];

  function SlotsScreen({ balance, onBalanceChange }) {
    const lang = React.useContext(LangCtx);
    const t = lang.slots;
    const [reels, setReels] = React.useState([randReel(), randReel(), randReel(), randReel(), randReel()]);
    const [bet, setBet] = React.useState(10);
    const [spinning, setSpinning] = React.useState(false);
    const [winAmount, setWinAmount] = React.useState(0);
    const [message, setMessage] = React.useState('');
    const BETS = [5, 10, 25, 50, 100];

    const spin = () => {
      if (spinning || balance < bet) return;
      setSpinning(true); setWinAmount(0); setMessage('');
      const final = [randReel(), randReel(), randReel(), randReel(), randReel()];
      const mid = final.map(r => r[1].id);
      const allSame = mid.every(s => s === mid[0]);
      const threeSame = mid[0] === mid[1] && mid[1] === mid[2];
      let ticks = 0;
      const id = setInterval(() => {
        setReels([randReel(), randReel(), randReel(), randReel(), randReel()]);
        ticks++;
        if (ticks >= 14) {
          clearInterval(id);
          setReels(final);
          const win = allSame ? bet * 50 : threeSame ? bet * 5 : 0;
          setWinAmount(win);
          setMessage(win > 0 ? '' : t.miss);
          onBalanceChange(balance - bet + win);
          setSpinning(false);
        }
      }, 80);
    };
    const isWinner = ri => !spinning && winAmount > 0 && ri < 3;

    return (
      <div className="container" style={{ padding: '32px 40px 80px', maxWidth: 940 }}>
        <div className="row between mb-8">
          <div>
            <div className="label mb-2" style={{ color: 'var(--gold)' }}>{t.machine}</div>
            <h1 className="h1">{t.title}</h1>
          </div>
        </div>

        <div className="card-glow" style={{ padding: 40,
              background: 'linear-gradient(180deg, var(--bg-1), var(--bg-0))',
              border: '2px solid var(--gold-dim)',
              boxShadow: 'var(--glow-gold)' }}>
          {/* Reels */}
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 10,
            marginBottom: 32, padding: 24,
            background: 'radial-gradient(circle at center, #16111F, #0A0710)',
            borderRadius: 'var(--radius-md)', border: '1px solid var(--gold-dim)',
            boxShadow: 'inset 0 4px 20px rgba(0,0,0,.8)',
          }}>
            {reels.map((reel, ri) => (
              <div key={ri} className="col gap-2">
                {reel.map((s, si) => (
                  <div key={si}
                       className={`reel-cell ${si === 1 && isWinner(ri) ? 'winner' : ''}`}
                       style={{
                         aspectRatio: '1 / 1', display: 'grid', placeItems: 'center',
                         background: si === 1
                           ? 'linear-gradient(135deg, var(--bg-3), var(--bg-2))'
                           : 'var(--bg-1)',
                         border: '1px solid var(--border-1)',
                         borderRadius: 'var(--radius-sm)',
                         fontFamily: 'var(--font-serif)',
                         fontSize: 52, fontWeight: 400, color: s.color,
                         letterSpacing: '-0.02em',
                         fontStyle: (s.id === 'F') ? 'italic' : 'normal',
                         transition: 'opacity .1s var(--ease)',
                         opacity: spinning ? 0.7 : 1,
                         textShadow: si === 1 ? `0 0 12px ${s.color}` : 'none',
                       }}>{s.label}</div>
                ))}
              </div>
            ))}
          </div>

          {/* Result + balance */}
          <div className="row between mb-6" style={{ padding: '0 8px' }}>
            <div>
              <div className="label mb-2">{t.result}</div>
              <div className="mono" style={{
                fontSize: 34, lineHeight: 1, fontWeight: 700,
                letterSpacing: '-0.02em',
                color: winAmount > 0 ? 'var(--green)' : 'var(--fg-3)',
                textShadow: winAmount > 0 ? 'var(--glow-green)' : 'none',
              }}>

  function WorkScreen({ balance, onBalanceChange }) {
    const lang = React.useContext(LangCtx);
    const t = lang.work;
    const [cooldown, setCooldown] = React.useState(127);
    const [totalEarned, setTotalEarned] = React.useState(3500);
    const [shifts, setShifts] = React.useState(7);
    const [activeJob, setActiveJob] = React.useState(1);
    const jobs = [
      { id: 0, name: lang.code === 'ru' ? 'Курьер' : lang.code === 'es' ? 'Repartidor' : 'Courier', pay: 200, time: 2, icon: I.briefcase },
      { id: 1, name: lang.code === 'ru' ? 'Официант' : lang.code === 'es' ? 'Camarero' : 'Waiter', pay: 500, time: 3, icon: I.user, active: true },
      { id: 2, name: lang.code === 'ru' ? 'Программист' : lang.code === 'es' ? 'Programador' : 'Programmer', pay: 2000, time: 8, icon: I.zap, locked: true, req: 'Lv 10' },
      { id: 3, name: lang.code === 'ru' ? 'Финансист' : lang.code === 'es' ? 'Financiero' : 'Financier', pay: 8000, time: 20, icon: I.wallet, locked: true, req: 'Lv 20' },
    ];
    React.useEffect(() => {
      if (cooldown <= 0) return;
      const id = setTimeout(() => setCooldown(v => Math.max(0, v - 1)), 1000);
      return () => clearTimeout(id);
    }, [cooldown]);
    const job = jobs[activeJob];
    const totalSec = job.time * 60;
    const pct = Math.min(100, ((totalSec - cooldown) / totalSec) * 100);
    const canClaim = cooldown === 0;
    const claim = () => {
      if (!canClaim) return;
      onBalanceChange(balance + job.pay);
      setTotalEarned(v => v + job.pay);
      setShifts(v => v + 1);
      setCooldown(totalSec);
    };
    const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

    return (
      <div className="container" style={{ padding: '32px 40px 80px' }}>
        <div className="mb-8">

    const lang = React.useContext(LangCtx);
    const [multi, setMulti] = React.useState(1.00);
    const [state, setState] = React.useState('idle'); // idle, flying, crashed, cashed
    const [bet, setBet] = React.useState(50);
    const [bustAt, setBustAt] = React.useState(null);
    const [history, setHistory] = React.useState([1.24, 3.08, 1.01, 12.4, 2.6, 1.8, 4.2]);

    React.useEffect(() => {
      if (state !== 'flying') return;
      const id = setInterval(() => {
        setMulti(m => {
          const next = +(m + 0.03 * Math.pow(m, 1.02)).toFixed(2);
          if (next >= bustAt) {
            setState('crashed');
            setHistory(h => [+bustAt.toFixed(2), ...h].slice(0, 10));
            return bustAt;
          }
          return next;
        });
      }, 80);
      return () => clearInterval(id);
    }, [state, bustAt]);

    const launch = () => {
      if (balance < bet) return;
      onBalanceChange(balance - bet);
      setMulti(1.00);
      setBustAt(1 + Math.pow(Math.random(), 2) * 15 + 0.1);
      setState('flying');
    };
    const cashout = () => {
      if (state !== 'flying') return;
      onBalanceChange(balance + Math.round(bet * multi));
      setState('cashed');
    };
    const reset = () => { setState('idle'); setMulti(1.00); };

    const color = state === 'crashed' ? 'var(--accent)'
                : state === 'cashed'  ? 'var(--green)' : 'var(--gold)';

    return (
      <div className="container" style={{ padding:'32px 40px 80px' }}>
        <div className="mb-8">
          <div className="label mb-2" style={{ color:'var(--green)' }}>Realtime</div>
          <h1 className="h1">{lang.games.crash}</h1>
        </div>
        <div className="grid gap-4" style={{ gridTemplateColumns:'2fr 1fr' }}>
          <div className="card-glow" style={{
            padding:0, minHeight:420,
            background:'radial-gradient(ellipse at 50% 100%, rgba(255,200,57,.15), var(--bg-1))',
            overflow:'hidden', position:'relative',
          }}>
            <svg viewBox="0 0 400 280" preserveAspectRatio="none"
                 style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
              <defs>
                <linearGradient id="crashGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stopColor={color} stopOpacity="0.4"/>
                  <stop offset="1" stopColor={color} stopOpacity="0"/>
                </linearGradient>
              </defs>
              <path d={`M 0 280 Q 120 ${280 - Math.min(multi, 15) * 15} 400 ${280 - Math.min(multi, 15) * 18} L 400 280 Z`}
                    fill="url(#crashGrad)"/>
              <path d={`M 0 280 Q 120 ${280 - Math.min(multi, 15) * 15} 400 ${280 - Math.min(multi, 15) * 18}`}
                    stroke={color} strokeWidth="3" fill="none"
                    style={{ filter:`drop-shadow(0 0 8px ${color})` }}/>
            </svg>
            <div style={{ position:'relative', zIndex:1, padding:'60px 40px', textAlign:'center' }}>
              <div className="mono" style={{ fontSize:96, fontWeight:800, lineHeight:1,
                    color, letterSpacing:'-0.03em',
                    textShadow:`0 0 24px ${color}` }}>
                {multi.toFixed(2)}×
              </div>
              <div className="label mt-4" style={{ color }}>
                {state === 'idle' ? 'WAITING'
                 : state === 'flying' ? 'IN FLIGHT'
                 : state === 'crashed' ? `BUST @ ${bustAt?.toFixed(2)}×`
                 : `CASHED @ ${multi.toFixed(2)}×`}
              </div>
            </div>
            <div style={{ position:'absolute', bottom:16, left:16, right:16, display:'flex', gap:6 }}>
              {history.map((h, i) => (
                <div key={i} style={{
                  flex:1, padding:'6px 0', borderRadius:4, textAlign:'center',
                  background: h < 2 ? 'rgba(255,46,99,.2)' : 'rgba(0,230,118,.2)',
                  color: h < 2 ? 'var(--accent-bright)' : 'var(--green)',
                  fontSize:11, fontWeight:700, fontFamily:'var(--font-mono)',
                }}>{h.toFixed(2)}×</div>
              ))}
            </div>
          </div>
          <div className="card col gap-4">
            <div className="field">
              <label>{lang.common.bet}</label>
              <div className="row gap-2">
                {[10,50,100,500].map(v => (
                  <button key={v} onClick={() => setBet(v)} disabled={state==='flying'}
                          style={{
                            flex:1, padding:'10px',
                            background: bet===v ? 'linear-gradient(135deg,var(--gold),var(--gold-dim))' : 'var(--bg-2)',
                            color: bet===v ? '#1A0F00' : 'var(--fg-2)',
                            fontFamily:'var(--font-mono)', fontWeight:600, fontSize:13,
                            borderRadius:'var(--radius-md)', border:'1px solid var(--border-1)',
                          }}>${v}</button>
                ))}
              </div>
            </div>
            {state === 'idle' && (
              <button onClick={launch} disabled={balance < bet} className="btn btn-primary btn-xl btn-block">
                {lang.common.launch} · ${bet}
              </button>
            )}
            {state === 'flying' && (
              <button onClick={cashout} className="btn btn-danger btn-xl btn-block">
                Cash out ${Math.round(bet * multi)}
              </button>
            )}
            {(state === 'crashed' || state === 'cashed') && (
              <button onClick={reset} className="btn btn-secondary btn-xl btn-block">

                ${Math.round(bet * multi).toLocaleString()}

            </div>
          </div>
        </div>
      </div>
    );
  }

  // ─── Hi-Lo (interactive) ─────────────────────────────────────────────────
  function HiLo({ balance, onBalanceChange }) {
    const lang = React.useContext(LangCtx);
    const [current, setCurrent] = React.useState(7);
    const [streak, setStreak] = React.useState(2);
    const [bet] = React.useState(20);
    const [anim, setAnim] = React.useState(null);
    const play = dir => {
      const next = Math.floor(Math.random()*13)+1;
      const correct = (dir==='hi' && next >= current) || (dir==='lo' && next <= current);
      setAnim(correct ? 'win' : 'lose');
      setTimeout(() => {
        setAnim(null);
        setCurrent(next);
        if (correct) { setStreak(s => s+1); onBalanceChange(balance + Math.round(bet*0.85)); }
        else { setStreak(0); onBalanceChange(balance - bet); }
      }, 600);
    };
    return (
      <div className="container" style={{ padding:'32px 40px 80px', maxWidth:680 }}>
        <div className="mb-8">
          <div className="label mb-2" style={{ color:'var(--gold)' }}>Card</div>

            background:'linear-gradient(180deg,#fafafa,#d6d6d6)',

            fontFamily:'var(--font-serif)', fontSize:120, fontWeight:700,
            color: current >= 7 ? 'var(--accent)' : '#111',
            boxShadow:'0 20px 60px rgba(0,0,0,.6), inset 0 0 0 3px rgba(255,200,57,.3)',
            transform: anim ? 'scale(1.05)' : 'scale(1)',
            transition:'transform .3s var(--ease-spring)',
          }}>{current}</div>
          <div className="mt-6">
            <span className="tag tag-gold" style={{ fontSize:13, padding:'6px 14px' }}>
              Streak × {streak}
            </span>
          </div>
          <div className="row gap-4 mt-8" style={{ justifyContent:'center' }}>

                             color:'#fff', fontWeight:700, minWidth:140 }}>
              ↑ Higher ×1.85
            </button>
          </div>
        </div>
      </div>
    );
  }

            }}>
              <div>
                <div style={{ fontSize:14, fontWeight:600, color:'var(--fg-1)' }}>{r.t}</div>
                <div className="p-sm" style={{ fontSize:12, marginTop:2 }}>{r.d}</div>
              </div>
              <div className="tag" style={{ justifySelf:'start', fontSize:10,
                    background: (r.c || (r.a > 0 ? 'var(--green-soft)' : 'var(--accent-soft)')),
                    color: (r.c ? '#fff' : (r.a > 0 ? 'var(--green)' : 'var(--accent-bright)')),
                    borderColor:'transparent' }}>
                {r.a > 0 ? 'IN' : 'OUT'}
              </div>
              <div className="mono" style={{ textAlign:'right', fontSize:15, fontWeight:700,
                    color: r.a > 0 ? 'var(--green)' : 'var(--accent-bright)' }}>
                {r.a > 0 ? '+' : '−'}${Math.abs(r.a).toLocaleString()}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ─── Big Win Modal ───────────────────────────────────────────────────────
  function WinModal() {
    const lang = React.useContext(LangCtx);
    const t = { ru:'КРУПНЫЙ ВЫИГРЫШ!', en:'BIG WIN!', es:'¡GRAN GANANCIA!' }[lang.code];
    return (
      <div style={{
        minHeight:'calc(100vh - 64px)', display:'grid', placeItems:'center', padding:24,
        position:'relative', overflow:'hidden',
      }}>
        <div style={{ position:'absolute', inset:0,
              background:'radial-gradient(circle at center, rgba(255,200,57,.3), transparent 60%)',
              pointerEvents:'none' }}/>
        <div className="card-glow" style={{
          padding:56, textAlign:'center', maxWidth:520,
          background:'linear-gradient(180deg, rgba(255,200,57,.1), var(--bg-1))',
          border:'2px solid var(--gold)', boxShadow:'var(--glow-gold), 0 40px 80px rgba(0,0,0,.6)',
        }}>
          <div style={{
            width:96, height:96, margin:'0 auto 20px', borderRadius:'50%',
            background:'linear-gradient(135deg,var(--gold-bright),var(--gold))',
            display:'grid', placeItems:'center', color:'#1A0F00',
            boxShadow:'var(--glow-gold)',
          }}>{React.cloneElement(I.trophy, { size: 48 })}</div>
          <div className="label mb-3 shimmer">{t}</div>
          <div className="mono shimmer" style={{
            fontSize:88, fontWeight:800, lineHeight:1, letterSpacing:'-0.03em',
          }}>+$12,400</div>
          <div className="p mt-3" style={{ color:'var(--fg-3)' }}>
            {lang.games.slots} · 5 of a kind · ×50
          </div>
          <div className="row gap-3 mt-8" style={{ justifyContent:'center' }}>
            <button className="btn btn-secondary btn-lg">Collect</button>
            <button className="btn btn-primary btn-lg">Double or nothing →</button>
          </div>
        </div>
      </div>
    );
  }

  // ─── Lose Screen (balance 0) ─────────────────────────────────────────────
  function LoseScreen() {
    const lang = React.useContext(LangCtx);
    const t = { ru:'Баланс пуст', en:'Balance empty', es:'Saldo vacío' }[lang.code];
    const sub = {
      ru:'И заметьте — это было виртуально. Представьте, если бы это были настоящие деньги.',
      en:"And remember — this was fake money. Now imagine it wasn't.",
      es:'Y recuerda: era dinero falso. Imagínalo con dinero real.',
    }[lang.code];
    return (
      <div style={{
        minHeight:'calc(100vh - 64px)', display:'grid', placeItems:'center', padding:24,
      }}>
        <div style={{ textAlign:'center', maxWidth:560 }}>
          <div style={{
            width:112, height:112, margin:'0 auto 32px', borderRadius:'50%',
            background:'linear-gradient(135deg,var(--accent),var(--purple))',
            display:'grid', placeItems:'center',
            boxShadow:'var(--glow-accent)',
          }}>{React.cloneElement(I.trendDown, { size: 56 })}</div>
          <div className="h-display mb-4" style={{ fontSize:56, color:'var(--accent-bright)' }}>{t}</div>
          <div className="mono mb-6" style={{ fontSize:72, fontWeight:800, color:'var(--fg-1)',
                letterSpacing:'-0.03em', lineHeight:1 }}>$0.00</div>
          <p className="p-lg mb-8">{sub}</p>
          <div className="row gap-3" style={{ justifyContent:'center', flexWrap:'wrap' }}>
            <button className="btn btn-danger btn-lg">{lang.credit.take}</button>
            <button className="btn btn-primary btn-lg">{lang.work.claim} · $500</button>
            <button className="btn btn-secondary btn-lg">{lang.common.balance} +$500</button>
          </div>
        </div>
      </div>
    );
  }

  // ─── Settings ────────────────────────────────────────────────────────────
  function Settings({ lang, onLangChange }) {
    const t = { ru:'Настройки', en:'Settings', es:'Ajustes' }[lang.code];
    const [sound, setSound] = React.useState(true);
    const [music, setMusic] = React.useState(true);
    const [notif, setNotif] = React.useState(false);
    const [haptic, setHaptic] = React.useState(true);
    const Toggle = ({ on, onClick }) => (
      <button onClick={onClick} style={{
        width:44, height:26, borderRadius:13, padding:2,
        background: on ? 'var(--green)' : 'var(--bg-3)',
        boxShadow: on ? 'var(--glow-green)' : 'none',
        transition:'background .2s',
      }}>
        <div style={{
          width:22, height:22, borderRadius:'50%', background:'#fff',
          transform: on ? 'translateX(18px)' : 'translateX(0)',
          transition:'transform .2s var(--ease-spring)',
        }}/>
      </button>
    );
    const Row = ({ icon, label, value, right }) => (
      <div style={{ display:'flex', alignItems:'center', gap:16, padding:'18px 20px',
            borderBottom:'1px solid var(--border-1)' }}>
        <span style={{ color:'var(--fg-3)' }}>{icon}</span>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:500, color:'var(--fg-1)' }}>{label}</div>
          {value && <div className="p-sm" style={{ fontSize:12 }}>{value}</div>}
        </div>
        {right}
      </div>
    );
    return (
      <div className="container" style={{ padding:'32px 40px 80px', maxWidth:720 }}>
        <div className="mb-8">
          <div className="label mb-2" style={{ color:'var(--fg-3)' }}>Preferences</div>
          <h1 className="h1">{t}</h1>
        </div>
        <div className="card" style={{ padding:0, overflow:'hidden' }}>
          <Row icon={I.volume} label={lang.code==='ru'?'Звуковые эффекты':lang.code==='es'?'Efectos de sonido':'Sound effects'}
               right={<Toggle on={sound} onClick={()=>setSound(!sound)}/>}/>
          <Row icon={I.volume} label={lang.code==='ru'?'Музыка':lang.code==='es'?'Música':'Music'}
               right={<Toggle on={music} onClick={()=>setMusic(!music)}/>}/>
          <Row icon={I.bell} label={lang.code==='ru'?'Уведомления':lang.code==='es'?'Notificaciones':'Push notifications'}
               right={<Toggle on={notif} onClick={()=>setNotif(!notif)}/>}/>
          <Row icon={I.zap} label={lang.code==='ru'?'Вибрация':lang.code==='es'?'Vibración':'Haptic feedback'}
               right={<Toggle on={haptic} onClick={()=>setHaptic(!haptic)}/>}/>
          <div style={{ display:'flex', alignItems:'center', gap:16, padding:'18px 20px' }}>
            <span style={{ color:'var(--fg-3)' }}>{I.globe}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:500, color:'var(--fg-1)' }}>
                {lang.code==='ru'?'Язык':lang.code==='es'?'Idioma':'Language'}
              </div>
              <div className="p-sm" style={{ fontSize:12 }}>{lang.label}</div>
            </div>
            <div className="row gap-2">
              {Object.values(window.TRANSLATIONS).map(l => (
                <button key={l.code} onClick={() => onLangChange(l)}
                        style={{
                          padding:'6px 10px', borderRadius:6, fontSize:12, fontWeight:600,
                          background: lang.code===l.code ? 'var(--gold)' : 'var(--bg-2)',
                          color: lang.code===l.code ? '#1A0F00' : 'var(--fg-2)',
                          border:'1px solid var(--border-1)',
                        }}>{l.flag} {l.code.toUpperCase()}</button>
              ))}
            </div>
          </div>
        </div>

        <div className="card mt-4" style={{ padding:0, overflow:'hidden' }}>
          {[
            { l: lang.code==='ru'?'Аккаунт':lang.code==='es'?'Cuenta':'Account', v:'igrok_1985' },
            { l:'Email', v:'player@example.com' },
            { l: lang.code==='ru'?'Выйти':lang.code==='es'?'Cerrar sesión':'Log out', v:'', danger:true },
          ].map((r, i, a) => (
            <div key={i} style={{ padding:'18px 20px', borderBottom: i<a.length-1 ? '1px solid var(--border-1)' : undefined,
                  display:'flex', alignItems:'center', gap:12 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14, fontWeight:500,
                      color: r.danger ? 'var(--accent-bright)' : 'var(--fg-1)' }}>{r.l}</div>
                {r.v && <div className="p-sm" style={{ fontSize:12 }}>{r.v}</div>}
              </div>
              {!r.danger && <span style={{ color:'var(--fg-4)' }}>{I.arrowR}</span>}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ─── Leaderboard ─────────────────────────────────────────────────────────
  function Leaderboard() {
    const lang = React.useContext(LangCtx);
    const t = { ru:'Лидерборд', en:'Leaderboard', es:'Clasificación' }[lang.code];
    const sub = { ru:'Кто проиграл больше всех за неделю.',
                  en:'Who lost the most this week.',
                  es:'Quién perdió más esta semana.' }[lang.code];
    const rows = [
      { r:1, n:'whale_88',     lost:84210, time:'62h' },
      { r:2, n:'lucky_loser',  lost:52300, time:'48h' },
      { r:3, n:'casino_ghost', lost:41080, time:'33h' },
      { r:4, n:'roulette_rita',lost:22100, time:'19h', you:false },
      { r:5, n:'spin2win',     lost:18400, time:'14h' },
      { r:6, n:'igrok_1985',   lost:2840,  time:'2h 47m', you:true },
      { r:7, n:'high_roller',  lost:1920,  time:'4h' },
    ];
    const rankColor = r => r===1 ? 'var(--gold)' : r===2 ? '#C0C0C0' : r===3 ? '#CD7F32' : 'var(--fg-3)';
    return (
      <div className="container" style={{ padding:'32px 40px 80px', maxWidth:820 }}>
        <div className="mb-8">
          <div className="label mb-2" style={{ color:'var(--accent)' }}>Weekly</div>
          <h1 className="h1 mb-4">{t}</h1>
          <p className="p-lg" style={{ maxWidth:540 }}>{sub}</p>
        </div>

        {/* Top 3 podium */}
        <div className="grid gap-3 mb-6" style={{ gridTemplateColumns:'1fr 1.2fr 1fr', alignItems:'flex-end' }}>
          {[rows[1], rows[0], rows[2]].map((p, i) => {
            const h = [140, 180, 120][i];
            const c = rankColor(p.r);
            return (
              <div key={p.r} className="card" style={{
                textAlign:'center', padding:'20px 12px', height:h,
                background:`linear-gradient(180deg, ${c}22, var(--bg-1))`,
                borderColor:`${c}55`,
                display:'flex', flexDirection:'column', justifyContent:'flex-end',
              }}>
                <div className="mono" style={{ fontSize:36, fontWeight:800, color:c, lineHeight:1 }}>
                  #{p.r}
                </div>
                <div style={{ fontSize:13, fontWeight:600, color:'var(--fg-1)', marginTop:6 }}>{p.n}</div>
                <div className="money" style={{ fontSize:14, color:'var(--accent-bright)', marginTop:4 }}>
                  −${p.lost.toLocaleString()}
                </div>
              </div>
            );
          })}
        </div>

        <div className="card" style={{ padding:0, overflow:'hidden' }}>
          {rows.slice(3).map((r, i) => (
            <div key={r.n} style={{
              display:'grid', gridTemplateColumns:'40px 1fr auto auto', gap:14,
              padding:'16px 20px', alignItems:'center',
              background: r.you ? 'linear-gradient(90deg,rgba(255,200,57,.1),transparent)' : undefined,
              borderBottom: i < rows.length-4 ? '1px solid var(--border-1)' : undefined,
            }}>
              <div className="mono" style={{ fontSize:15, fontWeight:700, color:rankColor(r.r) }}>#{r.r}</div>
              <div>
                <div style={{ fontSize:14, fontWeight:600,
                      color: r.you ? 'var(--gold)' : 'var(--fg-1)' }}>
                  {r.n}{r.you && <span className="tag tag-gold" style={{ marginLeft:8, fontSize:10 }}>YOU</span>}
                </div>
                <div className="p-sm" style={{ fontSize:12 }}>{r.time}</div>
              </div>
              <div className="money" style={{ color:'var(--accent-bright)', fontSize:15 }}>
                −${r.lost.toLocaleString()}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  window.ExtraScreens = {
    Blackjack, Craps, Crash, HiLo, Topup, Onboarding,
    Inbox, DailyBonus, History, WinModal, LoseScreen,
    Settings, Leaderboard,
  };
})();

</script>
  <script type="text/babel" data-presets="react">window.__AppBoot && window.__AppBoot();</script>
</body>
</html>
