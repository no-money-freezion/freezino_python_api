<!doctype html><html><head><meta charset="utf-8"><title>Accent</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div class="label" style="margin-bottom:10px">Accent · vermillion</div>
        <div style="height:80px;border-radius:var(--radius-md);background:var(--accent)"></div>
        <div class="mono" style="font-size:12px;color:var(--fg-3);margin-top:8px">#E8432C</div>
      </div>
      <div>
        <div class="label" style="margin-bottom:10px">Accent · dim</div>
        <div style="height:80px;border-radius:var(--radius-md);background:var(--accent-dim)"></div>
        <div class="mono" style="font-size:12px;color:var(--fg-3);margin-top:8px">#C53A26</div>
      </div>
    </div>
    <p class="p-sm" style="margin-top:16px;max-width:420px">
      One accent, used sparingly — focus rings, the losing meter, destructive actions. Nothing else is red.
    </p>
  </body></html>
