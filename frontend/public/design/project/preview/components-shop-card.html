<!doctype html><html><head><meta charset="utf-8"><title>Shop item</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div style="background:var(--bg-1);border:1px solid var(--border-1);border-radius:var(--radius-lg);overflow:hidden;max-width:280px">
      <div style="aspect-ratio:4/3;background:linear-gradient(135deg,#2A2A2E,#1A1A1D);position:relative;display:grid;place-items:center">
        <div style="font-family:var(--font-serif);font-size:64px;color:var(--fg-3);font-style:italic">F</div>
        <div style="position:absolute;top:12px;left:12px;padding:4px 10px;background:rgba(11,11,12,.75);backdrop-filter:blur(8px);border-radius:var(--radius-full);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--tier-legendary);border:1px solid var(--border-1)">Legendary</div>
      </div>
      <div style="padding:20px;display:flex;flex-direction:column;gap:12px">
        <div>
          <div class="h3" style="font-size:17px;margin-bottom:4px">Ferrari F8</div>
          <div class="p-sm" style="font-size:13px">Tributo V8 купе</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="label" style="font-size:10px">Цена</div>
            <div class="money" style="font-size:18px">$280,000</div>
          </div>
          <button style="background:var(--accent);color:var(--fg-1);padding:8px 16px;border-radius:var(--radius-md);border:none;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit">Купить</button>
        </div>
      </div>
    </div>
  </body></html>
