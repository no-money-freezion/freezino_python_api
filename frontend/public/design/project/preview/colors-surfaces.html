<!doctype html><html><head><meta charset="utf-8"><title>Surfaces</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div class="label" style="margin-bottom:12px">Dark surfaces</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      
        <div>
          <div style="height:80px;border-radius:var(--radius-md);background:var(--bg-0);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:8px">--bg-0</div>
        </div>
      
        <div>
          <div style="height:80px;border-radius:var(--radius-md);background:var(--bg-1);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:8px">--bg-1</div>
        </div>
      
        <div>
          <div style="height:80px;border-radius:var(--radius-md);background:var(--bg-2);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:8px">--bg-2</div>
        </div>
      
        <div>
          <div style="height:80px;border-radius:var(--radius-md);background:var(--bg-3);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:8px">--bg-3</div>
        </div>
      
    </div>
    <p class="p-sm" style="margin-top:16px;max-width:420px">Elevation comes from surface color, not shadows.</p>
  </body></html>
