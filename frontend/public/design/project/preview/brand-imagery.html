<!doctype html><html><head><meta charset="utf-8"><title>Imagery</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <p class="p-sm" style="max-width:460px;margin-bottom:16px">
      Shop photography is editorial — desaturated, low contrast, product-on-neutral. Filter <code class="mono" style="color:var(--fg-2)">saturate(.85) contrast(1.02)</code> applied globally so any stock image reads as part of the system.
    </p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:520px">
      
        <div style="aspect-ratio:4/3;background:linear-gradient(135deg,rgba(60,60,65,.6),var(--bg-1));border:1px solid var(--border-1);border-radius:var(--radius-md);display:grid;place-items:center;font-family:var(--font-serif);font-style:italic;color:var(--fg-3);font-size:32px">F</div>
      
        <div style="aspect-ratio:4/3;background:linear-gradient(135deg,rgba(80,75,70,.6),var(--bg-1));border:1px solid var(--border-1);border-radius:var(--radius-md);display:grid;place-items:center;font-family:var(--font-serif);font-style:italic;color:var(--fg-3);font-size:32px">F</div>
      
        <div style="aspect-ratio:4/3;background:linear-gradient(135deg,rgba(50,55,60,.6),var(--bg-1));border:1px solid var(--border-1);border-radius:var(--radius-md);display:grid;place-items:center;font-family:var(--font-serif);font-style:italic;color:var(--fg-3);font-size:32px">F</div>
      
    </div>
  </body></html>
