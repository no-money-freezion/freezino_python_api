<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="__btn-primary">Войти</button>
      <button class="__btn-primary-lg">Крутить · $10</button>
      <button class="__btn-secondary">Очистить</button>
      <button class="__btn-ghost">Отмена</button>
      <button class="__btn-icon" aria-label="settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/></svg>
      </button>
    </div>
    <style>
      .__btn-primary,.__btn-primary-lg{background:var(--accent);color:var(--fg-1);padding:10px 18px;border-radius:var(--radius-md);border:none;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
      .__btn-primary-lg{padding:14px 24px;font-size:15px}
      .__btn-secondary{background:var(--bg-2);color:var(--fg-1);border:1px solid var(--border-1);padding:10px 18px;border-radius:var(--radius-md);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
      .__btn-ghost{background:transparent;color:var(--fg-3);padding:10px 18px;border:none;font-size:14px;font-family:inherit;cursor:pointer}
      .__btn-icon{width:36px;height:36px;border-radius:var(--radius-md);background:var(--bg-2);color:var(--fg-2);border:1px solid var(--border-1);display:grid;place-items:center;cursor:pointer}
    </style>
  </body></html>
