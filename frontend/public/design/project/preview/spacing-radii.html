<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px">
      
        <div>
          <div style="height:72px;border-radius:var(--radius-sm);background:var(--bg-2);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">sm · 2px</div>
        </div>
      
        <div>
          <div style="height:72px;border-radius:var(--radius-md);background:var(--bg-2);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">md · 6px</div>
        </div>
      
        <div>
          <div style="height:72px;border-radius:var(--radius-lg);background:var(--bg-2);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">lg · 10px</div>
        </div>
      
        <div>
          <div style="height:72px;border-radius:var(--radius-xl);background:var(--bg-2);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">xl · 16px</div>
        </div>
      
        <div>
          <div style="height:72px;border-radius:var(--radius-full);background:var(--bg-2);border:1px solid var(--border-1)"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">full · ∞px</div>
        </div>
      
    </div>
  </body></html>
