<!doctype html><html><head><meta charset="utf-8"><title>Card</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div style="background:var(--bg-1);border:1px solid var(--border-1);border-radius:var(--radius-lg);padding:24px;max-width:320px;display:flex;flex-direction:column;gap:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="width:40px;height:40px;border-radius:var(--radius-md);background:var(--bg-2);display:grid;place-items:center;color:var(--fg-2)">

        </div>
      </div>
      <div>
        <div class="h3" style="margin-bottom:4px">Рулетка</div>
        <div class="p-sm" style="margin:0">Европейская, 37 чисел</div>
      </div>
      <div style="padding-top:16px;border-top:1px solid var(--border-1);display:flex;justify-content:space-between;align-items:center">
        <span class="label">Мин. ставка</span>
        <span class="money" style="font-size:13px">$10</span>
      </div>
    </div>
