<!doctype html><html><head><meta charset="utf-8"><title>Semantic</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div style="display:flex;gap:24px;flex-wrap:wrap">
      <div>
        <div class="label" style="margin-bottom:10px">Win</div>
        <div style="height:64px;width:140px;border-radius:var(--radius-md);background:var(--win)"></div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">#8FA68E sage</div>
      </div>
      <div>
        <div class="label" style="margin-bottom:10px">Loss · danger</div>
        <div style="height:64px;width:140px;border-radius:var(--radius-md);background:var(--accent)"></div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">#E8432C accent</div>
      </div>
      <div>
        <div class="label" style="margin-bottom:10px">Money</div>
        <div style="height:64px;width:140px;border-radius:var(--radius-md);background:var(--bg-2);border:1px solid var(--border-1);display:grid;place-items:center" class="money">$12,450</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">white · tabular</div>
      </div>
    </div>
    <p class="p-sm" style="margin-top:16px;max-width:440px">
      Money is white, not gold. Sage stands in for green — quieter than neon, honest about small wins.
    </p>
  </body></html>
