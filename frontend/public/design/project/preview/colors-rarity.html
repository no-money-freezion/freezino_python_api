<!doctype html><html><head><meta charset="utf-8"><title>Tiers</title><link rel="stylesheet" href="_base.css"><style>body{padding:32px}</style></head><body>
    <div class="label" style="margin-bottom:12px">Shop tiers (luminance, not hue)</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      
        <div>
          <div style="height:72px;border-radius:var(--radius-md);background:#8C8A84"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">common</div>
        </div>
      
        <div>
          <div style="height:72px;border-radius:var(--radius-md);background:#B5B3AB"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">rare</div>
        </div>
      
        <div>
          <div style="height:72px;border-radius:var(--radius-md);background:#D9D6CC"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">epic</div>
        </div>
      
        <div>
          <div style="height:72px;border-radius:var(--radius-md);background:#E8C26A"></div>
          <div class="mono" style="font-size:11px;color:var(--fg-3);margin-top:6px">legendary</div>
        </div>
      
    </div>
    <p class="p-sm" style="margin-top:16px;max-width:440px">
      Tiers differ by lightness, not saturation. Only the top tier carries a muted gold.
    </p>
  </body></html>
