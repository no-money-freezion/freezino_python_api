# Reference host-level nginx config for freezino.online.
#
# This is NOT loaded by the dockerized compose stack — it lives on the
# host (/etc/nginx/sites-available/freezino) and routes traffic into the
# two local containers started by docker-compose.prod.yml:
#
#   /api/   →  http://127.0.0.1:3000   (FastAPI backend)
#   /ws/    →  http://127.0.0.1:3000   (reserved; Python API does not yet
#                                       implement WebSocket — will 502)
#   /       →  http://127.0.0.1:3001   (frontend nginx:alpine image)
#
# TLS certs come from certbot (letsencrypt), already provisioned on the
# host from the previous Go-backend deploy. They do not need to be
# reissued during the Python cutover.
#
# Diff from the pre-cutover Go-era config:
#   - Go config used `root /opt/freezino/frontend/dist;` + `try_files`
#     to serve static files directly from disk.
#   - Python config uses `proxy_pass http://127.0.0.1:3001;` because the
#     frontend now lives inside a container. Simpler to reason about,
#     and lets the CD workflow replace the container without touching
#     system nginx at all.
#
# To apply:
#   sudo cp scripts/nginx-freezino.conf /etc/nginx/sites-available/freezino
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    server_name freezino.online www.freezino.online;

    # --- API --------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90;
    }

    # --- WebSocket (not yet implemented in Python API) --------------
    # Left pointing at 127.0.0.1:3000 so that when BE ships it, no
    # nginx change is needed. Until then these requests return 502,
    # which is fine — no page currently depends on WS.
    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90;
    }

    # --- Frontend (dockerized nginx:alpine on 127.0.0.1:3001) -------
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Gzip at the edge for everything the upstream didn't already compress.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # TLS — certs issued by certbot on the host (pre-existing).
    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/freezino.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freezino.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name freezino.online www.freezino.online;
    return 301 https://$host$request_uri;
}
