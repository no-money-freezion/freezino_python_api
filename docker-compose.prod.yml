services:
  # ---- FastAPI Backend ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: freezino-backend:latest
    container_name: freezino-backend-prod
    restart: always
    expose:
      - "3000"
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Fails loud if SECRET_KEY is unset in .env — intentional.
      # main.py ignores it right now (BE-006 taboo), but .env already has
      # the real value so the cutover when BE-006 lands is zero-config.
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DB_PATH: /app/data/freezino.db
      CORS_ORIGINS: ${CORS_ORIGINS:-https://freezino.online}
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    networks:
      - freezino-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- React Frontend (built static, served by its own nginx image) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_ENABLED: "false"
    image: freezino-frontend:latest
    container_name: freezino-frontend-prod
    restart: always
    expose:
      - "80"
    networks:
      - freezino-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Nginx reverse proxy (edge) ----
  nginx:
    image: nginx:alpine
    container_name: freezino-nginx-prod
    restart: always
    ports:
      # Published to host on 8080 so the system-level nginx on the server
      # (which terminates TLS for freezino.online) can proxy_pass here.
      # See DO-011 / server cutover notes.
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - freezino-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local
  nginx-logs:
    driver: local

networks:
  freezino-network:
    driver: bridge
