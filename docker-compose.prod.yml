services:
  # ---- FastAPI Backend ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: freezino-backend:latest
    container_name: freezino-backend-prod
    restart: always
    # Published on loopback only — the system-level nginx on the host
    # (which terminates TLS for freezino.online and lives alongside other
    # projects on this box) proxies /api/ → 127.0.0.1:3000. This is the
    # same port the old Go backend used, so the existing nginx site
    # config does not need to change its /api/ proxy_pass.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Fails loud if SECRET_KEY is unset in .env — intentional.
      # main.py ignores it right now (BE-006 taboo), but .env already has
      # the real value so the cutover when BE-006 lands is zero-config.
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DB_PATH: /app/data/freezino.db
      CORS_ORIGINS: ${CORS_ORIGINS:-https://freezino.online}
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    networks:
      - freezino-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--tries=1", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- React Frontend (built static, served by its own nginx image) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time.
        # /api on same-origin — system nginx proxies it to backend.
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_ENABLED: "false"
    image: freezino-frontend:latest
    container_name: freezino-frontend-prod
    restart: always
    # Also loopback-only. System nginx proxies / → 127.0.0.1:3001.
    ports:
      - "127.0.0.1:3001:80"
    networks:
      - freezino-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: There is no edge nginx service in production. The host already
  # runs system-level nginx which handles TLS termination (letsencrypt)
  # and serves several other projects alongside freezino. That nginx
  # proxies /api/ → backend container and / → frontend container. See
  # .github/docs/secrets.md and `scripts/nginx-freezino.conf` for the
  # system nginx snippet that replaces the old Go layout.

volumes:
  backend-data:
    driver: local
  backend-logs:
    driver: local

networks:
  freezino-network:
    driver: bridge
